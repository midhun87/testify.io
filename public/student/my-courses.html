                    Dashboard

                <a href="/student/test-history" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">

                    My Certificates
                </a>
                <a href="/student/my-courses" class="sidebar-link active flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"></path></svg>
                    My Courses
                </a>
                <div class="pt-4 mt-4 border-t border-slate-700/50">
                    <p class="px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Workspace</p>
                    <a href="/student/compiler" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                        <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"></path></svg>
                        Code Space

                        <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.25 9.75h7.5v7.5h-7.5v-7.5zM3.375 3.375h17.25v17.25h-17.25v-17.25z"></path></svg>

            <div class="p-4 mt-auto border-t border-slate-700/50 flex-shrink-0">
                 <a href="/student/profile" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.75 7.5a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 1115 0v.75H4.5v-.75z"></path></svg>
                    My Profile
                </a>
            </div>

        <!-- Main content -->
        <div class="flex flex-col flex-1 overflow-y-auto w-full custom-scrollbar">
            
            <!-- Header -->
            <header class="flex items-center justify-between h-20 bg-white border-b border-slate-200 px-4 sm:px-8 sticky top-0 z-30 flex-shrink-0">
                <div class="flex items-center">
                    <button id="open-sidebar-btn" class="mr-4 md:hidden text-slate-500 hover:text-slate-800 focus:outline-none bg-slate-100 p-2 rounded-lg">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold text-slate-800 tracking-tight">My Learning Path</h1>
                        <p class="text-xs sm:text-sm text-slate-500 font-medium mt-0.5">Your assigned courses and learning progress.</p>
                    </div>
                </div>
                
                <div class="flex items-center">
                    <div class="relative">
                        <button id="user-menu-button" class="flex items-center space-x-2 sm:space-x-3 focus:outline-none hover:bg-slate-50 py-1.5 px-2 sm:px-3 rounded-full transition-colors border border-transparent hover:border-slate-200">
                            <!-- <img id="profile-image-header" src="https://placehold.co/40x40/E2E8F0/4A5568?text=S" alt="Profile" class="w-9 h-9 rounded-full object-cover border border-slate-300 shadow-sm"> -->
                            <span id="user-name" class="font-semibold text-slate-700 text-sm hidden sm:block">Student Name</span>
                            <svg class="h-4 w-4 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                        </button>
                        <div id="user-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg py-2 z-50 border border-slate-100">
                            <a href="#" id="logout-button" class="block px-4 py-2 text-sm text-red-600 hover:bg-slate-50 font-medium">Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <main class="p-4 sm:p-8 max-w-7xl mx-auto w-full flex-grow">
                <div id="courses-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
                    <!-- Course cards will be injected here -->
                    <div class="col-span-full text-center py-10">
                        <div class="inline-block animate-spin w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full mb-4"></div>
                        <p class="text-slate-500 font-medium">Loading your courses...</p>
                    </div>
                </div>
            </main>
            
            <footer class="bg-white border-t border-slate-200 p-5 mt-auto flex-shrink-0">
                <div class="text-center text-sm font-medium text-slate-500">
                    &copy; 2025 TESTIFY. All Rights Reserved.
                </div>
            </footer>
        </div>
    </div>

    <script>
        // --- Mobile Sidebar Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            const openBtn = document.getElementById('open-sidebar-btn');
            const closeBtn = document.getElementById('close-sidebar-btn');
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            function toggleSidebar() {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }

            if(openBtn) openBtn.addEventListener('click', toggleSidebar);
            if(closeBtn) closeBtn.addEventListener('click', toggleSidebar);
            if(overlay) overlay.addEventListener('click', toggleSidebar);
        });

        // --- Core Application Logic (Untouched API interaction) ---
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user'));

            if (!token || !user) { window.location.href = '/login'; return; }

            document.getElementById('user-name').textContent = user.fullName;

            async function fetchProfileImage() {
                try {
                    const response = await fetch('/api/student/profile', { headers: { 'x-auth-token': token } });
                    if (response.ok) {
                        const profileData = await response.json();
                        // if (profileData.profileImageUrl) {
                        //    document.getElementById('profile-image-header').src = profileData.profileImageUrl;
                        // }
                    }
                } catch (error) { console.error('Error fetching profile image:', error); }
            }
            await fetchProfileImage();

            document.getElementById('user-menu-button').addEventListener('click', () => document.getElementById('user-menu').classList.toggle('hidden'));
            document.getElementById('logout-button').addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            });

            const coursesContainer = document.getElementById('courses-container');

            try {
                const response = await fetch('/api/student/my-courses', {
                    headers: { 'x-auth-token': token }
                });
                if (!response.ok) throw new Error('Failed to fetch courses');

                const courses = await response.json();

                if (courses.length === 0) {
                    coursesContainer.innerHTML = `
                        <div class="col-span-full text-center py-16 px-6 glass-card rounded-2xl border border-dashed border-slate-300">
                            <svg class="mx-auto h-16 w-16 text-slate-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" /></svg>
                            <h3 class="mt-2 text-xl font-bold text-slate-800 tracking-tight">No Courses Assigned</h3>
                            <p class="mt-2 text-slate-500 font-medium max-w-sm mx-auto">Check back later to see if new learning materials have been assigned to your curriculum.</p>
                        </div>`;
                    return;
                }

                coursesContainer.innerHTML = ''; // clear loader
                courses.forEach(course => {
                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-2xl overflow-hidden flex flex-col justify-between hover:shadow-xl transition-all duration-300 group';
                    
                    let statusBadge;
                    if (course.completionPercentage === 100) {
                        statusBadge = `<span class="bg-emerald-100 text-emerald-800 border border-emerald-200 shadow-sm text-xs font-bold uppercase tracking-wide px-3 py-1 rounded-full">Completed</span>`;
                    } else if (course.completionPercentage > 0) {
                        statusBadge = `<span class="bg-sky-100 text-sky-800 border border-sky-200 shadow-sm text-xs font-bold uppercase tracking-wide px-3 py-1 rounded-full">In Progress</span>`;
                    } else {
                        statusBadge = `<span class="bg-slate-100 text-slate-700 border border-slate-200 shadow-sm text-xs font-bold uppercase tracking-wide px-3 py-1 rounded-full">Not Started</span>`;
                    }

                    card.innerHTML = `
                        <div>
                            <div class="relative overflow-hidden">
                                <img class="h-44 w-full object-cover transition-transform duration-500 group-hover:scale-105" src="https://placehold.co/600x400/6366F1/FFFFFF?text=${encodeURIComponent(course.title)}&font=inter" alt="${course.title}">
                                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
                                <div class="absolute bottom-3 left-4 right-4 flex justify-between items-end">
                                    ${statusBadge}
                                </div>
                            </div>
                            <div class="p-6">
                                <h2 class="text-xl font-extrabold text-slate-800 group-hover:text-indigo-600 transition-colors line-clamp-2 leading-tight mb-2">${course.title}</h2>
                                <p class="text-slate-500 text-sm font-medium mb-6 line-clamp-2 leading-relaxed">${course.description}</p>
                                
                                <div>
                                    <div class="flex justify-between mb-2">
                                        <span class="text-sm font-bold text-slate-700 uppercase tracking-wider">Progress</span>
                                        <span class="text-sm font-bold text-indigo-600">${course.completionPercentage}%</span>
                                    </div>
                                    <div class="w-full bg-slate-100 rounded-full h-2.5 shadow-inner">
                                        <div class="bg-indigo-600 h-2.5 rounded-full" style="width: ${course.completionPercentage}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 bg-slate-50 border-t border-slate-100 mt-auto">
                             <a href="/student/view-course.html?id=${course.courseId}" class="inline-flex justify-center items-center w-full px-4 py-3 bg-white border border-slate-300 text-slate-800 font-bold rounded-xl hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-200 shadow-sm hover:shadow transition-all group-hover:bg-indigo-600 group-hover:text-white group-hover:border-indigo-600">
                                ${course.completionPercentage > 0 ? 'Continue Learning' : 'Start Course'}
                            </a>
                        </div>
                    `;
                    coursesContainer.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching courses:', error);
                coursesContainer.innerHTML = `<div class="col-span-full p-4 bg-red-50 text-red-600 rounded-xl border border-red-100 font-medium">Could not load your courses. Please try again later.</div>`;
            }
        });
    </script>
