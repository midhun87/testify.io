                    Test History
                </a>
                <a href="/student/my-certificates" class="sidebar-link active flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

                </a>
                <a href="/student/my-courses" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"></path></svg>
                    My Courses
                </a>
                <div class="pt-4 mt-4 border-t border-slate-700/50">
                    <p class="px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Workspace</p>

                        Code Space

                    <a href="/student/sql-compiler" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium mt-1">

            <div class="p-4 mt-auto border-t border-slate-700/50 flex-shrink-0">
                 <a href="/student/profile" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.75 7.5a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 1115 0v.75H4.5v-.75z"></path></svg>

        <!-- Main content -->
        <div class="flex flex-col flex-1 overflow-y-auto w-full custom-scrollbar">
            
            <!-- Header -->
            <header class="flex items-center justify-between h-20 bg-white border-b border-slate-200 px-4 sm:px-8 sticky top-0 z-30 flex-shrink-0">
                <div class="flex items-center">
                    <button id="open-sidebar-btn" class="mr-4 md:hidden text-slate-500 hover:text-slate-800 focus:outline-none bg-slate-100 p-2 rounded-lg">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 class="text-xl sm:text-2xl font-bold text-slate-800 tracking-tight">My Certificates</h1>
                </div>
                
                <div class="flex items-center">
                    <div class="relative">
                        <button id="user-menu-button" class="flex items-center space-x-2 sm:space-x-3 focus:outline-none hover:bg-slate-50 py-1.5 px-2 sm:px-3 rounded-full transition-colors border border-transparent hover:border-slate-200">
                            <span id="user-name" class="font-semibold text-slate-700 text-sm hidden sm:block">Student</span>
                            <svg class="h-4 w-4 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                        </button>
                        <div id="user-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg py-2 z-50 border border-slate-100">
                            <a href="#" id="logout-button" class="block px-4 py-2 text-sm text-red-600 hover:bg-slate-50 font-medium">Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <main class="p-4 sm:p-8 max-w-6xl mx-auto w-full flex-grow">
                <div class="glass-card p-6 sm:p-8 rounded-2xl mb-6">
                    <div class="flex items-center mb-6">
                        <div class="bg-amber-100 p-2.5 rounded-xl mr-4 text-amber-600 shadow-sm border border-amber-200">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800 tracking-tight">Your Achievements</h2>
                    </div>
                    
                    <div id="certificates-list" class="space-y-4">
                        <!-- Certificates will be loaded here -->
                        <div class="text-center py-10">
                            <div class="inline-block animate-spin w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full mb-4"></div>
                            <p class="text-slate-500 font-medium">Loading certificates...</p>
                        </div>
                    </div>
                </div>
            </main>
            
            <footer class="bg-white border-t border-slate-200 p-5 mt-auto flex-shrink-0">
                <div class="text-center text-sm font-medium text-slate-500">
                    &copy; 2025 TESTIFY. All Rights Reserved.
                </div>
            </footer>
        </div>
    </div>

    <script>
        // --- Mobile Sidebar Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            const openBtn = document.getElementById('open-sidebar-btn');
            const closeBtn = document.getElementById('close-sidebar-btn');
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            function toggleSidebar() {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }

            if(openBtn) openBtn.addEventListener('click', toggleSidebar);
            if(closeBtn) closeBtn.addEventListener('click', toggleSidebar);
            if(overlay) overlay.addEventListener('click', toggleSidebar);
        });

        // --- Core Logic (Untouched API interaction) ---
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('token');
            if (!token || !user || user.role !== 'Student') {
                window.location.href = '/login';
                return;
            }
            document.getElementById('user-name').textContent = user.fullName;
            
            const userMenuButton = document.getElementById('user-menu-button');
            const userMenu = document.getElementById('user-menu');
            const logoutButton = document.getElementById('logout-button');
            userMenuButton.addEventListener('click', () => userMenu.classList.toggle('hidden'));
            logoutButton.addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            });

            // --- FETCH AND DISPLAY CERTIFICATES ---
            const certificatesList = document.getElementById('certificates-list');
            async function fetchCertificates() {
                try {
                    const response = await fetch('/api/student/certificates', {
                        headers: { 'x-auth-token': token }
                    });
                    if (!response.ok) throw new Error('Failed to fetch certificates');
                    const certificates = await response.json();

                    certificatesList.innerHTML = '';
                    if (certificates.length === 0) {
                        certificatesList.innerHTML = '<div class="text-center p-10 border border-dashed border-slate-300 rounded-xl bg-slate-50"><p class="text-slate-500 font-medium">You have not earned any certificates yet. Complete tests to unlock achievements.</p></div>';
                        return;
                    }

                    certificates.forEach(cert => {
                        const certElement = document.createElement('div');
                        certElement.className = 'flex flex-col sm:flex-row sm:items-center justify-between bg-slate-50 p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow gap-4';
                        const issuedDate = new Date(cert.issuedAt).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
                        
                        const title = cert.courseTitle || cert.testTitle;
                        const type = cert.certificateType === 'Course' ? 'Course' : 'Test';
                        const badgeColor = type === 'Course' ? 'bg-sky-100 text-sky-800' : 'bg-indigo-100 text-indigo-800';

                        certElement.innerHTML = `
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="font-extrabold text-slate-800 text-lg leading-tight">${title}</h3>
                                    <span class="px-2.5 py-0.5 text-xs font-bold uppercase rounded-full ${badgeColor} border border-white/50 shadow-sm">${type}</span>
                                </div>
                                <p class="text-sm font-medium text-slate-500 flex items-center">
                                    <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    Issued on: ${issuedDate}
                                </p>
                            </div>
                            <a href="/student/view-certificate.html?id=${cert.certificateId}" class="inline-flex justify-center items-center px-6 py-2.5 bg-white border border-slate-300 text-indigo-600 text-sm font-bold rounded-xl shadow-sm hover:bg-indigo-50 hover:border-indigo-200 hover:text-indigo-700 transition-colors w-full sm:w-auto">
                                View Certificate
                            </a>
                        `;
                        certificatesList.appendChild(certElement);
                    });
                } catch (error) {
                    console.error('Error fetching certificates:', error);
                    certificatesList.innerHTML = '<div class="p-4 bg-red-50 text-red-600 rounded-xl border border-red-100 font-medium">Could not load your certificates.</div>';
                }
            }
            await fetchCertificates();
        });
    </script>
