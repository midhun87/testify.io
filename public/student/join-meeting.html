<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Meeting - TESTIFY</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dpz44zf0z/image/upload/v1756037774/Gemini_Generated_Image_eu0ib0eu0ib0eu0i_z0amjh.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f8fafc;
        }
        .sidebar-link {
            transition: all 0.2s ease-in-out;
        }
        .sidebar-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }
        .sidebar-link.active {
            background-color: #4F46E5;
            color: #ffffff;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
        }
        .glass-card {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
        }
        /* Custom pulsing animation for the "LIVE" badge */
        @keyframes pulse-live {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-pulse-live {
            animation: pulse-live 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        /* Mobile sidebar transition */
        #mobile-sidebar {
            transition: transform 0.3s ease-in-out;
        }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden">

    <div class="flex h-screen bg-slate-50 overflow-hidden">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

        <!-- Sidebar (Desktop & Mobile) -->

            <div class="flex items-center justify-between md:justify-center h-20 border-b border-slate-700/50 px-6 md:px-0 flex-shrink-0">
                <div class="flex items-center">
                    <img class="h-10 w-10 object-contain" src="https://res.cloudinary.com/dpz44zf0z/image/upload/v1756037774/Gemini_Generated_Image_eu0ib0eu0ib0eu0i_z0amjh.png" alt="TESTIFY Logo">
                    <span class="ml-3 text-2xl font-bold tracking-tight text-white">TESTIFY</span>
                </div>
                <!-- Mobile Close Button -->
                <button id="close-sidebar-btn" class="md:hidden text-slate-400 hover:text-white focus:outline-none">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="flex flex-col flex-grow p-4 overflow-y-auto space-y-1 custom-scrollbar">
                <a href="/student/dashboard" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Dashboard
                </a>
                <a href="/student/join-meeting" class="sidebar-link active flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"></path></svg>
                    Join Meeting
                </a>
                <a href="/student/Test" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    Take Test
                </a>
                <a href="/student/test-history" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Test History
                </a>
                <a href="/student/my-certificates" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    My Certificates
                </a>
                <a href="/student/my-courses" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"></path></svg>
                    My Courses
                </a>
                <div class="pt-4 mt-4 border-t border-slate-700/50">
                    <p class="px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Workspace</p>
                    <a href="/student/compiler" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                        <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"></path></svg>
                        Code Space
                    </a>
                    <a href="/student/sql-compiler" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium mt-1">
                        <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.25 9.75h7.5v7.5h-7.5v-7.5zM3.375 3.375h17.25v17.25h-17.25v-17.25z"></path></svg>
                        SQL CodeLab
                    </a>
                </div>
            </div>
            
            <div class="p-4 mt-auto border-t border-slate-700/50 flex-shrink-0">
                 <a href="/student/profile" class="sidebar-link flex items-center px-4 py-3 rounded-xl text-sm font-medium">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.75 7.5a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 1115 0v.75H4.5v-.75z"></path></svg>
                    My Profile
                </a>
            </div>

        <!-- Main content -->
        <div class="flex flex-col flex-1 overflow-y-auto w-full custom-scrollbar">
            
            <!-- Header -->
            <header class="flex items-center justify-between h-20 bg-white border-b border-slate-200 px-4 sm:px-8 sticky top-0 z-30 flex-shrink-0">
                <div class="flex items-center">
                    <!-- Mobile Hamburger -->
                    <button id="open-sidebar-btn" class="mr-4 md:hidden text-slate-500 hover:text-slate-800 focus:outline-none bg-slate-100 p-2 rounded-lg">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold text-slate-800 tracking-tight">Scheduled Meetings</h1>
                        <p id="welcome-message" class="text-xs sm:text-sm text-slate-500 font-medium mt-0.5">Join your scheduled meetings here.</p>
                    </div>
                </div>
                
                <div class="flex items-center">
                    <div class="relative">
                        <button id="user-menu-button" class="flex items-center space-x-3 focus:outline-none hover:bg-slate-50 py-1.5 px-2 sm:px-3 rounded-full transition-colors border border-transparent hover:border-slate-200">
                            <!-- <img id="profile-image-header" src="https://placehold.co/40x40/E2E8F0/4A5568?text=S" alt="Profile" class="w-9 h-9 rounded-full object-cover border border-slate-300 shadow-sm"> -->
                            <span id="user-name" class="font-semibold text-slate-700 text-sm hidden sm:block">Student Name</span>
                            <svg class="h-4 w-4 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                        </button>
                        <div id="user-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg py-2 z-50 border border-slate-100">
                            <a href="#" id="logout-button" class="block px-4 py-2 text-sm text-red-600 hover:bg-slate-50 font-medium">Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <main class="p-4 sm:p-8 max-w-7xl mx-auto w-full flex-grow">
                
                <div id="attendance-summary" class="mb-8 grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6">
                     <!-- Attendance cards will be loaded here -->
                </div>
                
                <div class="mt-8 sm:mt-10">
                    <div class="flex items-center mb-6">
                        <div class="bg-indigo-100 p-2.5 rounded-xl mr-4 text-indigo-600">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800 tracking-tight">Upcoming Meetings</h2>
                    </div>
                    <div id="upcoming-meetings-list" class="space-y-4 sm:space-y-6">
                        <!-- Upcoming meetings will be loaded here -->
                    </div>
                </div>

                <div class="mt-10 sm:mt-12">
                    <div id="completed-meetings-toggle" class="w-full flex justify-between items-center text-left text-lg sm:text-xl font-bold text-slate-800 mb-6 p-5 sm:p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-indigo-300 hover:bg-slate-50 focus:outline-none cursor-pointer transition-colors group">
                        <span class="pointer-events-none flex items-center">
                            <svg class="w-6 h-6 mr-3 text-slate-400 group-hover:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Completed Meetings
                        </span>
                        <div class="flex items-center">
                            <button id="print-attendance-btn" class="hidden sm:flex px-4 py-2 bg-slate-800 text-white text-sm rounded-lg shadow-md hover:bg-slate-900 items-center hover:-translate-y-0.5 transition-transform z-10 relative">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm7-8a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                Print Report
                            </button>
                            <button id="print-attendance-btn-mobile" class="sm:hidden px-3 py-2 bg-slate-800 text-white rounded-lg shadow-md hover:bg-slate-900 z-10 relative ml-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm7-8a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                            </button>
                            <svg id="completed-meetings-icon" class="w-6 h-6 ml-4 text-slate-400 group-hover:text-indigo-500 transition-transform transform pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    <div id="completed-meetings-list" class="space-y-4 sm:space-y-6 hidden">
                        <!-- Completed meetings will be loaded here -->
                    </div>
                </div>

                <div id="loader" class="text-center py-16">
                    <div class="inline-block border-4 border-slate-100 border-t-indigo-600 rounded-full w-12 h-12 animate-spin shadow-sm"></div>
                    <p class="mt-4 text-slate-500 font-medium">Loading your meetings...</p>
                </div>
            </main>
            
            <footer class="bg-white border-t border-slate-200 p-5 mt-auto flex-shrink-0">
                <div class="text-center text-sm font-medium text-slate-500 flex flex-col sm:flex-row justify-center items-center">
                    <span>&copy; 2025 TESTIFY. All Rights Reserved.</span>
                </div>
            </footer>
        </div>
    </div>

    <script>
        // --- Mobile Sidebar Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            const openBtn = document.getElementById('open-sidebar-btn');
            const closeBtn = document.getElementById('close-sidebar-btn');
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            function toggleSidebar() {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }

            if(openBtn) openBtn.addEventListener('click', toggleSidebar);
            if(closeBtn) closeBtn.addEventListener('click', toggleSidebar);
            if(overlay) overlay.addEventListener('click', toggleSidebar);
        });

        // --- Original API Logic ---
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('token');

            if (!token || !user || user.role !== 'Student') {
                window.location.href = '/login';
                return;
            }
            document.getElementById('user-name').textContent = user.fullName;
            document.getElementById('welcome-message').textContent = `Welcome back, ${user.fullName.split(' ')[0]}!`;

            async function fetchProfileImage() {
                try {
                    const response = await fetch('/api/student/profile', { headers: { 'x-auth-token': token } });
                    if (response.ok) {
                        const profileData = await response.json();
                        // if (profileData.profileImageUrl) {
                        //    document.getElementById('profile-image-header').src = profileData.profileImageUrl;
                        // }
                    }
                } catch (error) { console.error('Error fetching profile image:', error); }
            }
            await fetchProfileImage();

            document.getElementById('user-menu-button').addEventListener('click', () => document.getElementById('user-menu').classList.toggle('hidden'));
            document.getElementById('logout-button').addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            });
            
            const upcomingMeetingsList = document.getElementById('upcoming-meetings-list');
            const completedMeetingsList = document.getElementById('completed-meetings-list');
            const attendanceSummary = document.getElementById('attendance-summary');
            const loader = document.getElementById('loader');

            const completedMeetingsToggle = document.getElementById('completed-meetings-toggle');
            const completedMeetingsIcon = document.getElementById('completed-meetings-icon');
            const printAttendanceBtn = document.getElementById('print-attendance-btn');
            const printAttendanceBtnMobile = document.getElementById('print-attendance-btn-mobile');
            let completedMeetingsData = [];

            completedMeetingsToggle.addEventListener('click', (e) => {
                // Prevent toggle if clicking on the print button
                if(e.target.closest('#print-attendance-btn') || e.target.closest('#print-attendance-btn-mobile')) return;
                
                completedMeetingsList.classList.toggle('hidden');
                completedMeetingsIcon.classList.toggle('rotate-180');
            });

            const handlePrint = (e) => {
                e.stopPropagation();

                if (completedMeetingsData.length === 0) {
                    alert('No completed meetings to print.');
                    return;
                }

                const logoUrl = "https://res.cloudinary.com/dpz44zf0z/image/upload/v1756037774/Gemini_Generated_Image_eu0ib0eu0ib0eu0i_z0amjh.png";
                const studentName = user.fullName;
                const printDate = new Date().toLocaleDateString();

                let tableRows = '';
                completedMeetingsData.forEach(meeting => {
                    tableRows += `
                        <tr>
                            <td>${meeting.title}</td>
                            <td>${meeting.date}</td>
                            <td class="${meeting.status === 'Attended' ? 'attended' : 'missed'}">${meeting.status}</td>
                        </tr>
                    `;
                });

                const printContent = `
                    <html>
                    <head>
                        <title>Attendance Report - ${studentName}</title>
                        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
                        <style>
                            body { font-family: 'Inter', sans-serif; margin: 2rem; color: #333; }
                            .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #e2e8f0; padding-bottom: 1rem; }
                            .header img { height: 50px; }
                            .header-text { text-align: right; }
                            h1 { color: #1e293b; font-size: 1.5rem; }
                            p { color: #475569; margin: 0.25rem 0; }
                            table { width: 100%; border-collapse: collapse; margin-top: 2rem; font-size: 0.9rem; }
                            th, td { border: 1px solid #cbd5e1; padding: 0.75rem; text-align: left; }
                            th { background-color: #f1f5f9; color: #334155; font-weight: 600; }
                            tr:nth-child(even) { background-color: #f8fafc; }
                            .attended { color: #166534; font-weight: 500; }
                            .missed { color: #991b1b; font-weight: 500; }
                            @media print {
                                body { margin: 1rem; }
                                .header { padding-bottom: 0.5rem;}
                            }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            <img src="${logoUrl}" alt="TESTIFY Logo">
                            <div class="header-text">
                                <h1>Attendance Report</h1>
                                <p><strong>Student:</strong> ${studentName}</p>
                                <p><strong>Date Printed:</strong> ${printDate}</p>
                            </div>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Meeting Title</th>
                                    <th>Date & Time</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </body>
                    </html>
                `;

                const printWindow = window.open('', '_blank');
                printWindow.document.write(printContent);
                printWindow.document.close();
                printWindow.focus();
                setTimeout(() => {
                    printWindow.print();
                    printWindow.close();
                }, 250);
            };

            printAttendanceBtn.addEventListener('click', handlePrint);
            printAttendanceBtnMobile.addEventListener('click', handlePrint);

            try {
                const response = await fetch('/api/student/meetings', {
                    headers: { 'x-auth-token': token }
                });
                
                if (!response.ok) throw new Error('Failed to load meetings.');

                const meetings = await response.json();
                loader.style.display = 'none';

                const now = new Date();
                let attendedCount = 0;
                let missedCount = 0;

                if (meetings.length > 0) {
                    meetings.sort((a, b) => new Date(a.startTime) - new Date(b.startTime));

                    meetings.forEach(meeting => {
                        const meetingTime = new Date(meeting.startTime);
                        const meetingEndTime = new Date(meetingTime.getTime() + (meeting.duration || 60) * 60000);
                        
                        const hasAttended = meeting.attendees && meeting.attendees.some(attendee => attendee.email === user.email);
                        const isMeetingEndedByAdmin = meeting.status === 'Ended';
                        const isMeetingLive = now >= meetingTime && now <= meetingEndTime && !isMeetingEndedByAdmin;
                        const isMeetingPast = now > meetingEndTime;
                        const isMeetingCompleted = isMeetingPast || isMeetingEndedByAdmin;


                        const meetingCard = document.createElement('div');
                        // Responsive card styling
                        meetingCard.className = 'glass-card p-5 sm:p-6 rounded-2xl flex flex-col md:flex-row items-start md:items-center justify-between gap-4 md:gap-6 group';
                        
                        let statusBadge;
                        let listToAppend;

                        if (isMeetingCompleted) {
                            listToAppend = completedMeetingsList;
                            if (hasAttended) {
                                attendedCount++;
                                statusBadge = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-800 uppercase tracking-wide">Attended</span>`;
                                completedMeetingsData.push({ title: meeting.title, date: meetingTime.toLocaleString(), status: 'Attended' });
                            } else {
                                missedCount++;
                                statusBadge = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-red-100 text-red-800 uppercase tracking-wide">Missed</span>`;
                                completedMeetingsData.push({ title: meeting.title, date: meetingTime.toLocaleString(), status: 'Missed' });
                            }
                        } else {
                            listToAppend = upcomingMeetingsList;
                             if (isMeetingLive) {
                                statusBadge = `<span class="animate-pulse-live inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700 uppercase tracking-wide shadow-sm border border-red-200"><span class="w-1.5 h-1.5 rounded-full bg-red-600 mr-1.5"></span> LIVE NOW</span>`;
                            } else {
                                statusBadge = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-indigo-100 text-indigo-700 uppercase tracking-wide border border-indigo-200">Upcoming</span>`;
                            }
                        }

                        const buttonHtml = `
                            <button 
                                data-meet-link="${meeting.meetLink}" 
                                data-meeting-id="${meeting.testId}"
                                class="join-btn w-full md:w-auto flex-shrink-0 px-6 py-3 ${isMeetingLive ? 'bg-indigo-600 hover:bg-indigo-700 hover:-translate-y-0.5 text-white shadow-md' : 'bg-slate-200 text-slate-500 cursor-not-allowed'} font-semibold rounded-xl transition-all"
                                ${!isMeetingLive ? 'disabled' : ''}>
                                ${isMeetingLive ? 'Join Meeting Now' : (isMeetingCompleted ? 'Meeting Ended' : 'Not Started Yet')}
                            </button>`;

                        meetingCard.innerHTML = `
                            <div class="flex-1 w-full">
                                <div class="flex flex-col sm:flex-row sm:items-center mb-2 gap-2 sm:gap-4">
                                    <h3 class="text-lg sm:text-xl font-bold text-slate-800 tracking-tight leading-tight">${meeting.title}</h3>
                                    <div class="inline-block">${statusBadge}</div>
                                </div>
                                <div class="flex items-center text-slate-500 text-sm mb-3 font-medium">
                                    <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    ${meetingTime.toLocaleString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
                                </div>
                                <p class="text-slate-600 text-sm leading-relaxed">${meeting.description || 'No specific agenda provided for this meeting.'}</p>
                            </div>
                            ${buttonHtml}
                        `;
                        listToAppend.appendChild(meetingCard);
                    });

                } 
                
                if (upcomingMeetingsList.children.length === 0) {
                     upcomingMeetingsList.innerHTML = `<div class="text-center glass-card p-10 rounded-2xl border border-slate-200 border-dashed"><svg class="mx-auto h-12 w-12 text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><p class="text-slate-500 font-medium">No upcoming meetings scheduled.</p></div>`;
                }
                if (completedMeetingsList.children.length === 0) {
                    completedMeetingsList.innerHTML = '<div class="text-center glass-card p-10 rounded-2xl border border-slate-200 border-dashed"><p class="text-slate-500 font-medium">No completed meetings history.</p></div>';
                }

                // Populate Attendance Summary with better UI
                attendanceSummary.innerHTML = `
                    <div class="glass-card p-5 sm:p-6 rounded-2xl relative overflow-hidden group">
                        <div class="absolute right-0 top-0 w-20 h-20 bg-slate-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                        <p class="text-sm font-semibold text-slate-500 uppercase tracking-wide relative z-10">Total Meetings</p>
                        <p class="text-3xl sm:text-4xl font-extrabold text-slate-800 mt-2 relative z-10">${meetings.length}</p>
                    </div>
                    <div class="glass-card p-5 sm:p-6 rounded-2xl relative overflow-hidden group border-b-4 border-b-emerald-500">
                        <div class="absolute right-0 top-0 w-20 h-20 bg-emerald-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                        <p class="text-sm font-semibold text-emerald-600 uppercase tracking-wide relative z-10">Attended</p>
                        <p class="text-3xl sm:text-4xl font-extrabold text-emerald-700 mt-2 relative z-10">${attendedCount}</p>
                    </div>
                    <div class="glass-card p-5 sm:p-6 rounded-2xl relative overflow-hidden group border-b-4 border-b-red-400">
                        <div class="absolute right-0 top-0 w-20 h-20 bg-red-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                        <p class="text-sm font-semibold text-red-500 uppercase tracking-wide relative z-10">Missed / Absent</p>
                        <p class="text-3xl sm:text-4xl font-extrabold text-red-600 mt-2 relative z-10">${missedCount}</p>
                    </div>
                `;

            } catch (error) {
                console.error('Error fetching meetings:', error);
                loader.style.display = 'none';
                upcomingMeetingsList.innerHTML = '<div class="text-center bg-red-50 border border-red-100 p-10 rounded-2xl"><p class="text-red-600 font-medium">Could not load meetings. Please check your connection and try again.</p></div>';
            }

            document.body.addEventListener('click', async (event) => {
                const joinButton = event.target.closest('.join-btn');
                if (joinButton && !joinButton.disabled) {
                    const meetLink = joinButton.dataset.meetLink;
                    const meetingId = joinButton.dataset.meetingId;

                    if (!meetLink) {
                        alert('Error: Meeting link is not available.');
                        return;
                    }

                    try {
                         await fetch(`/api/meetings/${meetingId}/join`, {
                            method: 'POST',
                            headers: { 'x-auth-token': token }
                        });
                    } catch (error) {
                        console.error('Failed to record attendance, but redirecting anyway:', error);
                    }

                    try {
                        const url = new URL(meetLink);
                        const meetingNumber = url.pathname.split('/j/')[1];
                        const passWord = url.searchParams.get('pwd');

                        if (!meetingNumber) throw new Error('Could not parse meeting number from link.');
                        
                        let zoomJoinUrl = `https://app.zoom.us/wc/join/${meetingNumber}`;
                        if (passWord) zoomJoinUrl += `?pwd=${passWord}`;
                        
                        window.location.href = zoomJoinUrl;
                    } catch (error) {
                        console.error("Redirection Error:", error);
                        alert(`Error: Could not redirect to the meeting. ${error.message}`);
                    }
                }
            });
        });
    </script>
</body>
</html>
