<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Room - HIRE WITH US</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dpz44zf0z/image/upload/v1760086493/HireWithUS_wtn0pc.png">
    
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/monokai.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .CodeMirror { height: 100%; font-size: 15px; font-family: 'Consolas', monospace; }
        .mirror-mode { transform: scaleX(-1); }
        /* Smooth shadow transitions for the floating component */
        .hover-shadow-xl { transition: box-shadow 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between z-30 shrink-0 shadow-sm">
        <div class="flex items-center gap-4">
            <!-- Added onerror fallback to prevent broken image icons on the logo -->
            <img src="https://res.cloudinary.com/dpz44zf0z/image/upload/v1760086493/HireWithUS_wtn0pc.png" 
                 alt="Logo" class="h-8" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display: none;" class="font-bold text-xl text-orange-600">HIRE WITH US</span>
            <div class="h-6 w-px bg-gray-300 mx-2"></div>
            <span class="font-semibold text-gray-700">Live Interview Room</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span class="text-xs text-gray-500 font-medium">Time Remaining</span>
                <div class="text-sm font-bold text-gray-800"><i class="fas fa-clock mr-1 text-orange-500"></i> <span id="timer">45:00</span></div>
            </div>
            <button id="leaveBtn" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Leave
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-grow relative flex bg-[#1e1e1e]">
        
        <!-- Left: Code Editor -->
        <div class="w-full h-full flex flex-col relative z-0">
            <div class="bg-gray-900 text-gray-300 px-4 py-2 text-sm flex justify-between items-center border-b border-gray-700">
                <div class="flex items-center gap-2">
                    <i class="fas fa-code text-orange-500"></i> 
                    <span class="font-medium text-gray-200">Code Editor</span>
                </div>
                <select id="languageSelect" class="bg-gray-800 border border-gray-700 rounded px-3 py-1 text-xs text-white focus:outline-none focus:border-orange-500">
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                </select>
            </div>
            <div class="flex-grow relative">
                <textarea id="codeEditor"></textarea>
            </div>
        </div>

        <!-- Floating Interviewer Container (Draggable) -->
        <div id="floating-interviewer-container" class="absolute top-6 right-6 w-72 md:w-80 bg-gray-900 rounded-xl shadow-2xl border border-gray-700 overflow-hidden flex flex-col z-50 hover-shadow-xl" style="left: auto; top: 24px;">
            
            <!-- Drag Handle -->
            <div id="floating-drag-handle" class="bg-gray-800 px-4 py-3 flex items-center justify-between cursor-move border-b border-gray-700 group select-none">
                <div class="flex items-center gap-2 text-gray-200 font-semibold text-sm">
                    <i class="fas fa-grip-horizontal text-gray-500 group-hover:text-gray-300 transition-colors"></i>
                    Interviewer
                </div>
                <div class="flex gap-2">
                    <button class="text-gray-400 hover:text-white transition-colors"><i class="fas fa-expand-alt text-xs"></i></button>
                </div>
            </div>
            
            <!-- Remote Video Section -->
            <div id="remote-video-wrapper" class="relative w-full aspect-video bg-black flex-shrink-0">
                <video id="remoteVideo" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                
                <!-- Remote Placeholder -->
                <div id="remote-video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-800 text-gray-400 z-10">
                    <i class="fas fa-user-circle text-5xl mb-3 text-gray-600"></i>
                    <span class="text-sm font-medium">Waiting for Interviewer...</span>
                </div>
            </div>
        </div>

        <!-- Local Video Container (Student's Camera) -->
        <div id="local-video-container" class="absolute bottom-6 right-6 w-40 md:w-48 aspect-video bg-gray-900 rounded-lg shadow-xl border-2 border-orange-500 overflow-hidden z-40 group">
            <video id="localVideo" autoplay muted playsinline class="w-full h-full object-cover mirror-mode hidden"></video>
            
            <!-- Local Placeholder -->
            <div id="local-video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-800 text-gray-400 z-10">
                <i class="fas fa-video-slash text-2xl mb-2 text-gray-600"></i>
                <span class="text-xs font-medium">Camera starting...</span>
            </div>
            
            <!-- Overlay Label -->
            <div class="absolute bottom-2 left-2 bg-black/60 px-2 py-1 rounded text-[10px] md:text-xs text-white backdrop-blur-sm pointer-events-none z-20">
                You (Student)
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/javascript/javascript.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Initialize CodeMirror Editor
            const editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
                lineNumbers: true,
                mode: 'javascript',
                theme: 'monokai',
                autoCloseBrackets: true,
                matchBrackets: true,
                indentUnit: 4,
                tabSize: 4
            });
            
            // Initial placeholder code
            editor.setValue("// Write your code here...\n\nfunction solution() {\n    \n}\n");

            // 2. Setup WebRTC / Camera Access
            const localVideo = document.getElementById('localVideo');
            const localPlaceholder = document.getElementById('local-video-placeholder');

            async function startLocalStream() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { width: { ideal: 1280 }, height: { ideal: 720 } }, 
                        audio: true 
                    });
                    
                    // FIX: Always use srcObject. Setting `video.src = stream` causes broken media icons in modern browsers.
                    if ('srcObject' in localVideo) {
                        localVideo.srcObject = stream;
                    } else {
                        // Fallback for very old browsers
                        localVideo.src = window.URL.createObjectURL(stream);
                    }
                    
                    // Display the video and hide the placeholder
                    localVideo.onloadedmetadata = () => {
                        localVideo.classList.remove('hidden');
                        localPlaceholder.classList.add('hidden');
                    };

                } catch (error) {
                    console.error('Error accessing media devices.', error);
                    localPlaceholder.querySelector('span').innerText = 'Camera access denied';
                    localPlaceholder.querySelector('i').classList.replace('fa-video-slash', 'fa-exclamation-triangle');
                    localPlaceholder.querySelector('i').classList.add('text-red-500');
                }
            }

            // 3. Draggable Floating Interviewer Container
            const container = document.getElementById('floating-interviewer-container');
            const handle = document.getElementById('floating-drag-handle');
            
            let isDragging = false;
            let offsetX, offsetY;

            const onMouseDown = (e) => {
                isDragging = true;
                
                // Support both touch and mouse
                let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                let clientY = e.clientY || (e.touches && e.touches[0].clientY);
                
                const rect = container.getBoundingClientRect();
                offsetX = clientX - rect.left;
                offsetY = clientY - rect.top;
                
                handle.style.cursor = 'grabbing';
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                document.addEventListener('touchmove', onMouseMove, { passive: false });
                document.addEventListener('touchend', onMouseUp);
            };

            const onMouseMove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                
                let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                let clientY = e.clientY || (e.touches && e.touches[0].clientY);

                let newLeft = clientX - offsetX;
                let newTop = clientY - offsetY;
                
                // Keep the floating window strictly within the viewport bounds
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                const contRect = container.getBoundingClientRect(); 
                
                if (newLeft < 0) newLeft = 0;
                if (newTop < 0) newTop = 0;
                if (newLeft + contRect.width > viewportWidth) newLeft = viewportWidth - contRect.width;
                if (newTop + contRect.height > viewportHeight) newTop = viewportHeight - contRect.height;

                container.style.top = `${newTop}px`;
                container.style.left = `${newLeft}px`;
            };

            const onMouseUp = () => {
                isDragging = false;
                handle.style.cursor = 'move';
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                document.removeEventListener('touchmove', onMouseMove);
                document.removeEventListener('touchend', onMouseUp);
            };

            handle.addEventListener('mousedown', onMouseDown);
            handle.addEventListener('touchstart', onMouseDown, { passive: false });

            // Initialize app functionalities
            startLocalStream();
        });
    </script>
</body>
</html>
