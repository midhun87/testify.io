<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Test Previews - TESTIFY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- JSZip and FileSaver for Bulk ZIP Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- html2pdf for Single Report Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link:hover { background-color: #4338CA; }
        .sidebar-link.active { background-color: #4F46E5; font-weight: 600; }
        /* Toggle Switch styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4F46E5;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4F46E5;
        }
        /* Modal & Print Styles */
        .modal-active { overflow-y: hidden; }
        @media print {
            body.modal-active { overflow: visible !important; height: auto !important; }
            body > * { display: none !important; }
            #preview-modal { 
                display: block !important; 
                position: absolute !important; 
                top: 0; left: 0; right: 0; 
                min-height: 100vh !important;
                height: auto !important; 
                overflow: visible !important; 
                background: white !important;
            }
            .modal-container, .modal-content, #modal-body {
                width: 100% !important; max-width: 100% !important; height: auto !important; max-height: none !important;
                overflow: visible !important; box-shadow: none !important; border: none !important; padding: 0 !important; margin: 0 !important;
            }
            .question-block { page-break-inside: avoid; }
            .print-hidden { display: none !important; }
            .print-visible { display: block !important; }
            .bg-green-100 { background-color: #d1fae5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .bg-red-100 { background-color: #fee2e2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .border-green-500 { border-color: #10b981 !important; }
            .border-red-500 { border-color: #ef4444 !important; }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen bg-gray-100">
        <!-- Sidebar -->
        <div class="hidden md:flex flex-col w-64 bg-gray-800 text-white print-hidden">
             <div class="flex items-center justify-center h-20 border-b border-gray-700">
                <img class="h-10 w-10" src="https://res.cloudinary.com/dpz44zf0z/image/upload/v1756037774/Gemini_Generated_Image_eu0ib0eu0ib0eu0i_z0amjh.png" alt="TESTIFY Logo">
                <span class="ml-3 text-2xl font-bold">TESTIFY</span>
            </div>
            <nav class="flex-grow p-4 overflow-y-auto">
                 <a href="dashboard.html" class="sidebar-link flex items-center px-4 py-3 mt-2 rounded-lg">
                     <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                     <span class="ml-3">Dashboard</span>
                 </a>
                 <a href="test-history.html" class="sidebar-link flex items-center px-4 py-3 mt-2 rounded-lg">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span class="ml-3">Test History</span>
                </a>
                <a href="admin-test-results.html" class="sidebar-link active flex items-center px-4 py-3 mt-2 rounded-lg">
                    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span class="ml-3">Manage Previews</span>
                </a>
            </nav>
        </div>

        <!-- Main content -->
        <div class="flex flex-col flex-1 overflow-y-auto print-hidden">
            <div class="flex items-center justify-between h-20 bg-white border-b border-gray-200 px-6">
                <h1 class="text-2xl font-bold text-gray-800">Student Test Results & Previews</h1>
                <div class="flex items-center">
                     <div class="relative">
                        <button id="user-menu-button" class="flex items-center space-x-2">
                            <span id="user-name" class="font-semibold text-gray-700">Admin</span>
                            <svg class="h-5 w-5 text-gray-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                        </button>
                        <div id="user-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-20">
                            <a href="#" id="logout-button" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Logout</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6">
                 <div class="bg-white p-6 rounded-xl shadow-md">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-gray-800">All Submissions</h2>
                        <div class="flex items-center space-x-4 w-3/4 justify-end">
                            <select id="test-title-filter" class="w-1/3 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="">All Tests</option>
                            </select>
                            <input type="text" id="search-input" placeholder="Search by student or test..." class="w-1/3 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <button id="bulk-download-btn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 shadow-md flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                Download ZIP
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3">Student Name</th>
                                    <th scope="col" class="px-6 py-3">Test Title</th>
                                    <th scope="col" class="px-6 py-3">Score</th>
                                    <th scope="col" class="px-6 py-3">Date</th>
                                    <th scope="col" class="px-6 py-3">Actions (Preview / Report)</th>
                                </tr>
                            </thead>
                            <tbody id="results-table-body">
                                <!-- Dynamic data will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Report Preview Modal -->
    <div id="preview-modal" class="modal-overlay hidden fixed inset-0 bg-gray-600 bg-opacity-50 h-full w-full flex items-center justify-center z-50">
        <div class="modal-container bg-white w-11/12 md:max-w-4xl mx-auto rounded-lg shadow-lg z-50 overflow-y-auto max-h-[90vh]">
            <div class="modal-content py-4 text-left px-6">
                <!-- Header for printing -->
                <div id="print-header" class="hidden print-visible mb-6">
                    <div class="flex justify-between items-center border-b pb-4">
                        <img src="https://res.cloudinary.com/dpz44zf0z/image/upload/v1756037774/Gemini_Generated_Image_eu0ib0eu0ib0eu0i_z0amjh.png" alt="TESTIFY Logo" class="h-12">
                        <div class="text-right text-sm">
                            <p id="user-name-print" class="font-bold text-xl"></p>
                            <p id="user-email-print" class="text-gray-600"></p>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-between items-center text-lg">
                        <p id="print-score" class="font-bold text-2xl text-indigo-700"></p>
                        <p id="print-result"></p>
                    </div>
                </div>
                <!-- Original Header -->
                <div class="flex justify-between items-center pb-3 print-hidden">
                    <p id="modal-test-title" class="text-2xl font-bold text-gray-800">Test Report</p>
                    <div class="flex items-center space-x-4">
                         <button id="download-pdf-btn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 flex items-center">
                             <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                             Download PDF
                         </button>
                         <button id="print-preview-btn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-300">
                             <svg class="w-4 h-4 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm7-8a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                             Print
                         </button>
                        <div id="close-modal" class="modal-close cursor-pointer z-50">
                            <svg class="fill-current text-gray-500 hover:text-red-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 18 18">
                                <path d="M14.53 4.53l-1.06-1.06L9 7.94 4.53 3.47 3.47 4.53 7.94 9l-4.47 4.47 1.06 1.06L9 10.06l4.47 4.47 1.06-1.06L10.06 9z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                <div id="modal-body" class="my-5 max-h-[70vh] overflow-y-auto pr-4">
                    <!-- Preview content will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use an absolute base URL or empty string to prevent parsing errors in sandbox environments (like blob: or file:)
        const API_BASE = (window.location.protocol === 'blob:' || window.location.origin === 'null') ? 'http://localhost:5000' : '';

        document.addEventListener('DOMContentLoaded', async () => {
            let token = localStorage.getItem('token');
            let user = null;
            
            try {
                user = JSON.parse(localStorage.getItem('user'));
            } catch(e) {
                console.error("Error parsing user data");
            }

            // Mock authentication for preview environment if missing
            if (!token || !user) {
                console.warn('No authentication found. Using mock Admin user for preview purposes.');
                token = 'mock-token';
                user = { role: 'Admin', fullName: 'Admin Preview' };
            }

            if (user.role !== 'Admin') {
                try {
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error('Redirect prevented:', error);
                    document.body.innerHTML = '<div class="flex items-center justify-center h-screen"><h2 class="text-2xl font-bold text-red-600">Access Denied: Admins Only</h2></div>';
                }
                return;
            }
            
            document.getElementById('user-name').textContent = user.fullName || 'Admin';

            const resultsTableBody = document.getElementById('results-table-body');
            const searchInput = document.getElementById('search-input');
            const testTitleFilter = document.getElementById('test-title-filter');
            const bulkDownloadBtn = document.getElementById('bulk-download-btn');
            
            // Modal Elements
            const previewModal = document.getElementById('preview-modal');
            const closeModalBtn = document.getElementById('close-modal');
            const printPreviewBtn = document.getElementById('print-preview-btn');
            const modalTestTitle = document.getElementById('modal-test-title');
            const modalBody = document.getElementById('modal-body');

            let allResults = [];
            let currentlyDisplayedResults = []; // Tracks what is currently shown

            async function fetchAllResults() {
                try {
                    resultsTableBody.innerHTML = '<tr><td colspan="5" class="text-center py-4">Loading results...</td></tr>';
                    const response = await fetch(`${API_BASE}/api/admin/all-test-results`, {
                        headers: { 'x-auth-token': token }
                    });
                    if (!response.ok) throw new Error('Failed to fetch results');
                    allResults = await response.json();
                } catch (error) {
                    console.warn('Network error or sandbox block. Using mock data for demonstration purposes:', error);
                    // Fallback to Mock Data if fetch fails (prevents complete UI breakdown in preview)
                    allResults = [
                        { resultId: 'r1', studentName: 'Alice Johnson', testTitle: 'JavaScript Basics', score: 85, submittedAt: new Date().toISOString(), allowPreview: true },
                        { resultId: 'r2', studentName: 'Bob Smith', testTitle: 'JavaScript Basics', score: 92, submittedAt: new Date(Date.now() - 86400000).toISOString(), allowPreview: false },
                        { resultId: 'r3', studentName: 'Charlie Davis', testTitle: 'React Fundamentals', score: 78, submittedAt: new Date(Date.now() - 172800000).toISOString(), allowPreview: true }
                    ];
                }

                currentlyDisplayedResults = [...allResults];
                populateTestDropdown(allResults);
                displayResults(allResults);
            }

            function populateTestDropdown(results) {
                const uniqueTitles = [...new Set(results.map(item => item.testTitle).filter(Boolean))];
                testTitleFilter.innerHTML = '<option value="">All Tests</option>';
                uniqueTitles.forEach(title => {
                    const option = document.createElement('option');
                    option.value = title;
                    option.textContent = title;
                    testTitleFilter.appendChild(option);
                });
            }

            function displayResults(results) {
                resultsTableBody.innerHTML = '';
                 if (results.length === 0) {
                    resultsTableBody.innerHTML = '<tr><td colspan="5" class="text-center py-4">No test submissions found.</td></tr>';
                    return;
                }
                results.forEach(item => {
                    const row = document.createElement('tr');
                    row.className = 'bg-white border-b hover:bg-gray-50';
                    const dateTaken = new Date(item.submittedAt).toLocaleDateString();

                    const toggleSwitch = `
                        <div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in cursor-pointer" title="Enable Student Preview">
                            <input type="checkbox" name="toggle" id="toggle-${item.resultId}" 
                                   class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" 
                                   data-result-id="${item.resultId}" ${item.allowPreview ? 'checked' : ''}/>
                            <label for="toggle-${item.resultId}" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                        </div>
                    `;

                    row.innerHTML = `
                        <td class="px-6 py-4 font-medium text-gray-900">${item.studentName || 'N/A'}</td>
                        <td class="px-6 py-4">${item.testTitle || 'N/A'}</td>
                        <td class="px-6 py-4 font-semibold">${item.score}%</td>
                        <td class="px-6 py-4">${dateTaken}</td>
                        <td class="px-6 py-4 flex items-center space-x-4">
                            ${toggleSwitch}
                            <button data-result-id="${item.resultId}" class="view-report-btn text-indigo-600 hover:underline font-semibold flex items-center">
                                <svg class="w-4 h-4 mr-1 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                View Report
                            </button>
                        </td>
                    `;
                    resultsTableBody.appendChild(row);
                });
            }
            
            function filterResults() {
                const searchTerm = searchInput.value.toLowerCase();
                const selectedTitle = testTitleFilter.value;

                currentlyDisplayedResults = allResults.filter(item => {
                    const matchesSearch = (item.studentName && item.studentName.toLowerCase().includes(searchTerm)) ||
                                          (item.testTitle && item.testTitle.toLowerCase().includes(searchTerm));
                    const matchesTitle = selectedTitle === "" || item.testTitle === selectedTitle;
                    
                    return matchesSearch && matchesTitle;
                });
                displayResults(currentlyDisplayedResults);
            }

            searchInput.addEventListener('input', filterResults);
            testTitleFilter.addEventListener('change', filterResults);

            // Toggle Permission & View Report Button clicks
            resultsTableBody.addEventListener('click', async (e) => {
                // View Report Handler
                if (e.target.classList.contains('view-report-btn')) {
                    const resultId = e.target.dataset.resultId;
                    openPreviewModal(resultId);
                }

                // Toggle Preview Handler
                if (e.target.classList.contains('toggle-checkbox')) {
                    const resultId = e.target.dataset.resultId;
                    const allowPreview = e.target.checked;
                    e.target.disabled = true;
                    try {
                        const response = await fetch(`${API_BASE}/api/admin/update-preview-permission`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                            body: JSON.stringify({ resultId, allowPreview })
                        });
                        if (!response.ok) {
                            const err = await response.json();
                            throw new Error(err.message || 'Failed to update permission');
                        }
                    } catch (error) {
                        console.warn('API error, assuming mock success:', error);
                    } finally {
                         const result = allResults.find(r => r.resultId === resultId);
                         if(result) result.allowPreview = allowPreview;
                         e.target.disabled = false;
                    }
                }
            });

            // --- ADMIN VIEW REPORT LOGIC ---
            async function openPreviewModal(resultId) {
                document.body.classList.add('modal-active');
                modalBody.innerHTML = '<div class="flex justify-center my-10"><p class="text-indigo-600 font-semibold animate-pulse">Fetching detailed report...</p></div>';
                previewModal.classList.remove('hidden');
                
                let data;
                try {
                    const response = await fetch(`${API_BASE}/api/admin/test-preview/${resultId}`, { 
                        headers: { 'x-auth-token': token } 
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.message || 'Could not load report.');
                    }
                    data = await response.json();
                } catch (error) {
                    console.warn('Using mock test-preview data due to fetch error:', error);
                    const mockMeta = allResults.find(r => r.resultId === resultId);
                    data = {
                        resultId: resultId,
                        studentName: mockMeta?.studentName || 'Student',
                        studentEmail: 'student@example.com',
                        testTitle: mockMeta?.testTitle || 'Sample Test',
                        score: mockMeta?.score || 85,
                        result: (mockMeta?.score || 85) >= 50 ? 'Pass' : 'Fail',
                        submittedAt: mockMeta?.submittedAt || new Date().toISOString(),
                        questions: [
                            { text: 'What is 2 + 2?', type: 'mcq', options: ['3', '4', '5', '6'], correctAnswer: '1' },
                            { text: 'Which keyword is used to declare a constant in JS?', type: 'mcq', options: ['var', 'let', 'const', 'function'], correctAnswer: '2' },
                            { text: 'What does HTML stand for?', type: 'fill-blank', correctAnswer: 'Hyper Text Markup Language' }
                        ],
                        studentAnswers: ['1', '1', 'HyperText Markup Language'] // 1st correct, 2nd wrong, 3rd technically wrong due to spacing but visualizes answer block
                    };
                }
                    
                // Populate header for print
                document.getElementById('user-name-print').textContent = data.studentName || 'Student';
                document.getElementById('user-email-print').textContent = data.studentEmail || '';
                
                const printScoreEl = document.getElementById('print-score');
                const printResultEl = document.getElementById('print-result');
                if (data.score !== undefined && data.result) {
                    printScoreEl.textContent = `Score: ${data.score}%`;
                    printResultEl.textContent = data.result;
                    printResultEl.className = 'font-bold px-4 py-1.5 rounded-full text-white tracking-wide'; 
                    if (data.result === 'Pass') printResultEl.classList.add('bg-green-500');
                    else printResultEl.classList.add('bg-red-500');
                }

                modalTestTitle.textContent = `${data.testTitle} - ${data.studentName}`;
                renderPreviewContent(data);
            }

            function renderPreviewContent(data) {
                let content = '';
                data.questions.forEach((q, index) => {
                    const userAnswer = data.studentAnswers[index];
                    let answerHtml = '';

                    if (q.type && q.type.startsWith('mcq')) {
                        answerHtml = q.options.map((opt, i) => {
                            const isUserAnswer = Array.isArray(userAnswer) ? userAnswer.includes(String(i)) : String(userAnswer) === String(i);
                            const isCorrect = Array.isArray(q.correctAnswers) ? q.correctAnswers.includes(String(i)) : String(q.correctAnswer) === String(i);
                            
                            let bgColor = 'bg-gray-50 border-gray-200';
                            if(isUserAnswer && isCorrect) bgColor = 'bg-green-100 border-green-500 shadow-sm';
                            else if(isUserAnswer && !isCorrect) bgColor = 'bg-red-100 border-red-500 shadow-sm';
                            else if(isCorrect) bgColor = 'bg-green-100 border-green-500 shadow-sm';
                            
                            return `<div class="p-3 rounded-lg border my-2 ${bgColor} text-gray-800"><span class="font-medium mr-2">${String.fromCharCode(65+i)}.</span> ${opt}</div>`;
                        }).join('');
                    } else { // fill-blank
                          const isCorrect = userAnswer && String(userAnswer).toLowerCase() === String(q.correctAnswer).toLowerCase();
                          answerHtml = `
                            <div class="p-3 mt-2 rounded-lg border ${isCorrect ? 'bg-green-100 border-green-500' : 'bg-red-100 border-red-500'}"><strong>Candidate's Answer:</strong> ${userAnswer || '<i>Not Answered</i>'}</div>
                            ${!isCorrect ? `<div class="p-3 mt-2 rounded-lg border bg-green-100 border-green-500"><strong>Correct Answer:</strong> ${q.correctAnswer}</div>` : ''}
                          `;
                    }

                    content += `
                        <div class="mb-8 pb-6 border-b border-gray-200 question-block">
                            <p class="text-lg font-semibold text-gray-800 mb-4"><span class="text-indigo-600 mr-1">Q${index + 1}.</span> ${q.text}</p>
                            <div class="space-y-1 text-sm">${answerHtml}</div>
                        </div>
                    `;
                });
                modalBody.innerHTML = content;
            }

            // Modal Closes
            closeModalBtn.addEventListener('click', () => {
                previewModal.classList.add('hidden');
                document.body.classList.remove('modal-active');
                modalBody.innerHTML = '';
            });

            printPreviewBtn.addEventListener('click', () => { window.print(); });

            // Direct Download PDF Logic for Single Report
            document.getElementById('download-pdf-btn').addEventListener('click', () => {
                const element = document.querySelector('.modal-content');
                const originalHeader = element.querySelector('.print-hidden');
                const printHeader = document.getElementById('print-header');
                const downloadBtn = document.getElementById('download-pdf-btn');
                
                // Get the containers that have scroll limits
                const modalContainer = document.querySelector('.modal-container');
                const scrollBody = document.getElementById('modal-body');
                
                // Temporarily swap headers for the PDF capture
                originalHeader.style.display = 'none';
                printHeader.classList.remove('hidden', 'print-visible');
                printHeader.style.display = 'block';
                
                // TEMPORARILY REMOVE SCROLL LIMITS so html2pdf captures everything
                modalContainer.classList.remove('max-h-[90vh]', 'overflow-y-auto');
                scrollBody.classList.remove('max-h-[70vh]', 'overflow-y-auto');
                
                const oldBtnText = downloadBtn.innerHTML;
                downloadBtn.innerHTML = '<svg class="animate-spin h-4 w-4 mr-2 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating...';
                downloadBtn.disabled = true;

                const studentName = document.getElementById('user-name-print').textContent.replace(/[^a-z0-9]/gi, '_');
                
                const opt = {
                    margin:       0.4,
                    filename:     `TestReport_${studentName}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, windowWidth: 1024 }, // windowWidth helps ensure layouts don't break
                    jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(element).save().then(() => {
                    // Revert styles back to screen view
                    originalHeader.style.display = '';
                    printHeader.style.display = '';
                    printHeader.classList.add('hidden', 'print-visible');
                    
                    // RESTORE SCROLL LIMITS
                    modalContainer.classList.add('max-h-[90vh]', 'overflow-y-auto');
                    scrollBody.classList.add('max-h-[70vh]', 'overflow-y-auto');
                    
                    downloadBtn.innerHTML = oldBtnText;
                    downloadBtn.disabled = false;
                });
            });

            // --- BULK DOWNLOAD ZIP LOGIC ---
            bulkDownloadBtn.addEventListener('click', async () => {
                const resultIdsToDownload = currentlyDisplayedResults.map(r => r.resultId);
                
                if (resultIdsToDownload.length === 0) {
                    alert('No results available to download. Please adjust your search.');
                    return;
                }

                bulkDownloadBtn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating ZIP...`;
                bulkDownloadBtn.disabled = true;

                let reports = [];
                try {
                    const response = await fetch(`${API_BASE}/api/admin/bulk-test-previews`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                        body: JSON.stringify({ resultIds: resultIdsToDownload })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.message || 'Failed to fetch detailed reports.');
                    }
                    reports = await response.json();
                } catch (error) {
                    console.warn('API fetch failed, mocking reports for ZIP payload.', error);
                    reports = resultIdsToDownload.map(id => {
                        const m = allResults.find(r => r.resultId === id);
                        return {
                            testTitle: m?.testTitle || 'Sample Test',
                            studentName: m?.studentName || 'Student',
                            studentEmail: 'student@example.com',
                            submittedAt: m?.submittedAt || new Date().toISOString(),
                            score: m?.score || 85,
                            result: (m?.score || 85) >= 50 ? 'Pass' : 'Fail',
                            resultId: id,
                            questions: [{ text: 'Mock test question?', type: 'mcq', options: ['A', 'B', 'C', 'D'], correctAnswer: '0'}],
                            studentAnswers: ['0']
                        };
                    });
                }
                    
                try {
                    const zip = new JSZip();

                    reports.forEach(data => {
                        // Generate a clean HTML Report for inside the ZIP
                        let content = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${data.testTitle} - ${data.studentName}</title>`;
                        content += `<style>
                            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; color: #333; max-width: 800px; margin: auto; line-height: 1.6; }
                            .header { border-bottom: 3px solid #4F46E5; padding-bottom: 20px; margin-bottom: 30px; }
                            .header h1 { color: #4F46E5; margin-bottom: 5px; }
                            .header h2 { color: #555; font-weight: normal; margin-top: 0; }
                            .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-weight: bold; color: white; }
                            .pass { background-color: #10B981; } .fail { background-color: #EF4444; }
                            .q-block { margin-bottom: 25px; padding: 20px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; }
                            .q-title { font-size: 16px; font-weight: bold; margin-top: 0; }
                            .opt { padding: 10px 15px; border: 1px solid #d1d5db; border-radius: 6px; margin-bottom: 8px; background: white; }
                            .correct { background-color: #d1fae5; border-color: #10b981; font-weight: 500; }
                            .incorrect { background-color: #fee2e2; border-color: #ef4444; font-weight: 500; }
                        </style></head><body>`;
                        
                        content += `<div class="header">
                            <h1>${data.testTitle}</h1>
                            <h2>Candidate: <strong>${data.studentName}</strong> &lt;${data.studentEmail}&gt;</h2>
                            <p>Date Submitted: ${new Date(data.submittedAt).toLocaleString()}</p>
                            <h3>Score: ${data.score}% | Result: <span class="badge ${data.result === 'Pass' ? 'pass' : 'fail'}">${data.result}</span></h3>
                        </div>`;

                        data.questions.forEach((q, index) => {
                            const userAnswer = data.studentAnswers[index];
                            let answerHtml = '';

                            if (q.type && q.type.startsWith('mcq')) {
                                answerHtml = q.options.map((opt, i) => {
                                    const isUserAnswer = Array.isArray(userAnswer) ? userAnswer.includes(String(i)) : String(userAnswer) === String(i);
                                    const isCorrect = Array.isArray(q.correctAnswers) ? q.correctAnswers.includes(String(i)) : String(q.correctAnswer) === String(i);
                                    
                                    let className = 'opt';
                                    if (isUserAnswer && isCorrect) className += ' correct';
                                    else if (isUserAnswer && !isCorrect) className += ' incorrect';
                                    else if (isCorrect) className += ' correct';
                                    
                                    return `<div class="${className}">${String.fromCharCode(65+i)}. ${opt}</div>`;
                                }).join('');
                            } else { // fill-blank
                                  const isCorrect = userAnswer && String(userAnswer).toLowerCase() === String(q.correctAnswer).toLowerCase();
                                  answerHtml = `
                                    <div class="opt ${isCorrect ? 'correct' : 'incorrect'}">Your Answer: ${userAnswer || 'Not Answered'}</div>
                                    ${!isCorrect ? `<div class="opt correct">Correct Answer: ${q.correctAnswer}</div>` : ''}
                                  `;
                            }

                            content += `
                                <div class="q-block">
                                    <p class="q-title">Q${index + 1}. ${q.text}</p>
                                    ${answerHtml}
                                </div>
                            `;
                        });

                        content += `</body></html>`;
                        
                        // Sanitize filename
                        const safeName = data.studentName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                        const safeTitle = data.testTitle.replace(/[^a-z0-9]/gi, '_').substring(0, 15);
                        zip.file(`${safeTitle}_${safeName}_${data.resultId.substring(0,6)}.html`, content);
                    });

                    const zipContent = await zip.generateAsync({ type: "blob" });
                    saveAs(zipContent, `TESTIFY_Bulk_Reports_${new Date().getTime()}.zip`);

                } catch (error) {
                    console.error('ZIP Error:', error);
                    alert(`Error generating ZIP: ${error.message}`);
                } finally {
                    bulkDownloadBtn.innerHTML = `<svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Download ZIP`;
                    bulkDownloadBtn.disabled = false;
                }
            });

            // Logout
            document.getElementById('logout-button').addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                try {
                    window.location.href = 'login.html';
                } catch(error) {
                    console.error('Redirect prevented:', error);
                    alert("Logged out successfully");
                }
            });
            document.getElementById('user-menu-button').addEventListener('click', () => {
                document.getElementById('user-menu').classList.toggle('hidden');
            });

            await fetchAllResults();
        });
    </script>
</body>
</html>
